name: V2Ray Server

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'مدت زمان (دقیقه)'
        required: false
        default: '120'

jobs:
  v2ray:
    runs-on: ubuntu-latest
    steps:
      - name: نصب و اجرای V2Ray
        run: |
          # نصب V2Ray
          bash <(curl -L https://raw.githubusercontent.com/v2fly/fhs-install-v2ray/master/install-release.sh)
          
          # ساخت کانفیگ ساده
          sudo cat > /usr/local/etc/v2ray/config.json <<EOF
          {
            "inbounds": [
              {
                "port": 8080,
                "protocol": "vmess",
                "settings": {
                  "clients": [
                    {
                      "id": "b831d1fe-5b92-4aa8-a1c8-6e1f7b8e6b2d",
                      "alterId": 0
                    }
                  ]
                },
                "streamSettings": {
                  "network": "ws",
                  "wsSettings": {
                    "path": "/"
                  }
                }
              }
            ],
            "outbounds": [
              {
                "protocol": "freedom"
              }
            ]
          }
          EOF
          
          # اجرای V2Ray
          sudo systemctl start v2ray
          
          # نمایش لینک کانفیگ
          echo "=== لینک کانفیگ VMESS ==="
          echo "vmess://$(echo -n '{"v":"2","ps":"GitHub-V2Ray","add":"localhost","port":"8080","id":"b831d1fe-5b92-4aa8-a1c8-6e1f7b8e6b2d","aid":"0","net":"ws","type":"none","host":"","path":"/","tls":""}' | base64 -w 0)"
          
          # نگه داشتن
          sleep ${{ github.event.inputs.duration }}m
